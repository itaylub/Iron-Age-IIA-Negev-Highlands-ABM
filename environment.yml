name: nomad_model
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.11
  
  # Core scientific computing
  - numpy=1.26
  - pandas=2.1
  - scipy=1.11
  
  # Geospatial libraries (replacements for arcpy)
  - rasterio=1.3.9
  - geopandas=0.14
  - fiona=1.9
  - shapely=2.0
  - pyproj=3.6
  
  # Visualization
  - matplotlib=3.8
  - seaborn=0.13
  - folium=0.15
  
  # Agent-based modeling
  - mesa=3.0
  
  # Optimization
  - optuna=3.5
  - scikit-learn=1.4
  
  # Data handling
  - h5py=3.10
  
  # Utilities
  - tqdm=4.66
  - sympy=1.12
  - pyyaml=6.0

  # Pip dependencies
  - pip
  - pip:
    - pysal==24.1