repos:
  # Lint with ruff. Matches the rules in pyproject.toml.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff

  # Strip outputs from Jupyter notebooks before commit so diffs stay clean
  # and the repo stays small. Run `pre-commit install` after `pip install
  # pre-commit nbstripout` (also in environment.yml from Phase 5 onward).
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout

  # Basic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: mixed-line-ending
